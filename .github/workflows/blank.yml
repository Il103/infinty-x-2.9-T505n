name: Build and Release Infinity X 2.9 for T505N

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'
        required: true
        default: '2.9'
      build_type:
        description: 'Build Type'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - userdebug
          - user

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 76800
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Setup 75GB Swap
        run: |
          sudo swapoff -a || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=76800 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=10240
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          echo 'vm.swappiness=10' | sudo tee /etc/sysctl.d/99-swap.conf
          sudo sysctl -p /etc/sysctl.d/99-swap.conf
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig ccache bc libssl-dev rsync python3 python3-pip ninja-build --no-install-recommends
          ccache -M 50G

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH
          git config --global user.email "builder@infinity-x.com"
          git config --global user.name "Infinity Builder"

      - name: Sync Infinity X 14.0
        run: |
          export PATH=~/bin:$PATH
          mkdir -p ~/android/infinity
          cd ~/android/infinity
          repo init -u https://github.com/ProjectInfinity-X/manifest -b 14.0 --git-lfs --depth=1
          repo sync -c -j8 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Clone Device Trees
        run: |
          cd ~/android/infinity
          git clone --depth=1 https://github.com/LineageOS/android_device_samsung_gta4l device/samsung/gta4l
          git clone --depth=1 https://github.com/LineageOS/android_device_samsung_gta4l-common device/samsung/gta4l-common
          git clone --depth=1 https://github.com/Matrixx-Devices/android_kernel_samsung_gta4l kernel/samsung/gta4l
          git clone --depth=1 https://github.com/Matrixx-Devices/android_vendor_samsung_gta4l-common vendor/samsung/gta4l-common

      - name: Build Infinity X
        run: |
          cd ~/android/infinity
          source build/envsetup.sh
          lunch infinity_gta4l-${{ github.event.inputs.build_type }}
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export NINJA_ARGS="-j4"
          mka infinity -j4 2>&1 | tee build.log

      - name: Prepare Release
        if: success()
        run: |
          cd ~/android/infinity/out/target/product/gta4l
          mkdir -p release
          cp *.zip release/ 2>/dev/null || true
          cp *.img release/ 2>/dev/null || true
          cd release
          md5sum * > md5sum.txt
          sha256sum * > sha256sum.txt

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Infinity X ${{ github.event.inputs.version }} for T505N
          body: |
            ## Infinity X ${{ github.event.inputs.version }} for Samsung Tab A7 (SM-T505N)
            
            **Device**: gta4l (LTE)
            **Android**: 14
            **Type**: ${{ github.event.inputs.build_type }}
            
            ### Installation:
            1. Download the ZIP file
            2. Boot to TWRP/Recovery
            3. Wipe System/Data/Cache
            4. Flash ROM
            5. Reboot and Enjoy!
            
            Made with love in Egypt 🇪🇬
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
