- name: Maximize Build Space & Logical Swap
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          # سواب 16 جيجا بس عشان نسيب للهارد براح
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig ccache bc libssl-dev rsync python3 python3-pip ninja-build --no-install-recommends
          ccache -M 5G # كاش صغير جداً عشان المساحة

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync and PURGE (The Nuclear Option)
        run: |
          mkdir -p ~/android/infinity
          cd ~/android/infinity
          git config --global user.email "builder@infinity-x.com"
          git config --global user.name "Infinity Builder"
          
          # الربط ببرانش 15 (تأكدنا إنه البرانش الصح)
          repo init -u https://github.com/ProjectInfinity-X/manifest -b 15 --git-lfs --depth=1 --no-clone-bundle
          
          # سينك سريع وخفيف
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune
          
          # الحركة الصايعة: مسح فولدر الـ .repo عشان نفضي 60 جيجا للهارد!
          rm -rf .repo
