env:
  # التوكن المشفر اللي طلعناه سوا في الصورة
  GITHUB_TOKEN: ENCRYPTED[!bb2d56c2963a05a89beaf9163fe12dd3e6a2e198190c962979031800d54eca68e359e401e3d2ac238943510b4f5cb0f2!]
  CIRRUS_WORKING_DIR: /tmp/android

task:
  name: "Infinity_X_Mega_Build_T505N"
  timeout_in: 120m
  # استخدام سيرفرات جوجل القوية (8 كورس و 32 جيجا رام)
  gce_instance:
    image_project: ubuntu-os-cloud
    image_family: ubuntu-2204-lts
    cpu: 8
    memory: 32G
    disk: 250 

  install_deps_script:
    - sudo apt-get update
    - sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig ccache bc libssl-dev rsync python3 python3-pip ninja-build --no-install-recommends
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo

  sync_script:
    - export PATH="~/bin:$PATH"
    - git config --global user.email "builder@infinity-x.com"
    - git config --global user.name "Infinity Builder"
    - repo init -u https://github.com/ProjectInfinity-X/manifest -b 15 --git-lfs --depth=1 --no-clone-bundle
    - repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

  clone_trees_script:
    - export PATH="~/bin:$PATH"
    # تحميل ملفات الـ Trees والـ Kernel والـ Vendor لتابلت A7
    - git clone --depth=1 https://github.com/LineageOS/android_device_samsung_gta4l device/samsung/gta4l
    - git clone --depth=1 https://github.com/LineageOS/android_device_samsung_gta4l-common device/samsung/gta4l-common
    - git clone --depth=1 https://github.com/Matrixx-Devices/android_kernel_samsung_gta4l kernel/samsung/gta4l
    - git clone --depth=1 https://github.com/Matrixx-Devices/android_vendor_samsung_gta4l-common vendor/samsung/gta4l-common
    # مسح الـ .repo فوراً بعد السينك عشان نفضي 80 جيجا مساحة للهارد
    - rm -rf .repo 

  build_script:
    - export PATH="~/bin:$PATH"
    - source build/envsetup.sh
    - lunch infinity_gta4l-userdebug
    - export USE_CCACHE=1
    - mka infinity -j$(nproc --all)

  upload_script:
    - export PATH="~/bin:$PATH"
    - cd out/target/product/gta4l/
    - zip -r InfinityX_T505N_Android15.zip *.zip *.img
    - |
      curl -v -H "Authorization: token $GITHUB_TOKEN" \
           -H "Content-Type: application/zip" \
           --data-binary @InfinityX_T505N_Android15.zip \
           "https://uploads.github.com/repos/${CIRRUS_REPO_FULL_NAME}/releases"
